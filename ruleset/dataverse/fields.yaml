topic: Fields
description: Good practices for Dataverse Table Fields.
rules:
- id: FLD-001
  title: 'Naming rules:'
  description: 'Naming rules:'
  guidelines:
  - The *Snake Case* notation must be used in the Name.
  - Avoid abbreviations in the Display Name or Name as much as possible.
  - Make the Display Name as descriptive as possible, remembering that this value can be changed if necessary.
  - Make the Display Name unique.
  - If you need to use the same Display Name as an existing system field, change the system field Display Name to include the OOTB (Out-of-the-box) prefix.
  - If the field type is Lookup, it must end with the _id suffix.
  - If the field type is Lookup, check the Relationship name and adjust it to use the *Snake Case* notation.
  - If you have multiple fields grouped logically, use the same prefix for all of them in the Name and Display Name.
  rationale:
  - The Snake Case syntax facilitates reading the name and is aligned with the underscore character used between the publisher prefix and the name. It makes clear that the name refers to a field in the C# or TypeScript early bound generated code.
  - Abbreviations are not always understood by everybody.
  - Unique Display Names avoid confusion for developers and users alike.
  - Ending Lookup fields with the _id suffix makes it clear the field is an Entity Reference when working with code.
  - Grouping multiple related fields with the same prefix makes it easier to identify and view them as a group in the Dataverse designers.
  examples:
    good:
    - value: Several fields grouped logically
      note: cspreviewduedate, cspreviewcompletedon, cspreviewlink.
    bad:
    - value: The same fields without a consistent prefix
      note: cspduedatereview, cspreviewcompletedon, csplinkreview - harder to identify as a group.
  references:
  - title: Microsoft Learn - Power Platform Documentation
    url: https://learn.microsoft.com/en-us/power-platform/
- id: FLD-002
  title: Every field must include a description
  description: Every field must include a description. !Field Description
  guidelines:
  - Always include a description, remembering that it will be shown as a tooltip in the user interface.
  - If the field is for internal system purposes, start the description with "System Field." and include it in the hidden Admin tab (FRM-001).
  rationale:
  - Descriptions facilitate understanding the use and purpose of any field, for both users and developers.
  - Marking system fields with a "System Field." prefix makes it immediately clear that the field is not intended for end-user interaction.
  examples:
    good:
    - value: '"The date when the customer''s last order was placed. Used to calculate inactivity alerts."'
    - value: '"System Field. Stores the workflow processing status for automated monitoring."'
    bad:
    - description: No description at all - users and developers have no context about the field's purpose.
    - description: '"Field 1" - meaningless, provides no useful information.'
  references:
  - title: Microsoft Learn - Power Platform Documentation
    url: https://learn.microsoft.com/en-us/power-platform/
- id: FLD-003
  title: Choose the most specific and appropriate data type for each field
  description: Choose the most specific and appropriate data type for each field.
  guidelines:
  - Use Whole Number or Decimal for numeric data instead of Text.
  - Use Date and Time or Date Only for date values instead of Text.
  - Use Choice (Option Set) for fields with a fixed set of predefined values instead of Text.
  - Use Lookup fields to establish relationships to other tables instead of storing IDs or names in Text fields.
  - Use Currency for monetary values to leverage built-in currency handling and exchange rate support.
  - Set appropriate maximum length for Text fields based on realistic data needs. Avoid leaving the default 100 or setting unnecessarily large limits.
  rationale:
  - Using the correct data type enables built-in validation, formatting, filtering, and sorting that Text fields do not provide.
  - Storing dates or numbers as Text prevents proper comparison, grouping, and reporting in views and charts.
  - Lookup fields maintain referential integrity and enable relationship-based security, views, and navigation.
  - Oversized Text fields waste storage and can lead to poor data quality when users enter unstructured content.
  examples:
    good:
    - description: Conforms to the rule requirements.
    bad:
    - description: Violates the rule requirements.
  references:
  - title: Types of columns - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/maker/data-platform/types-of-fields
- id: FLD-004
  title: Use Global Choices (Global Option Sets) for values that are shared across multiple tables
  description: Use Global Choices (Global Option Sets) for values that are shared across multiple tables. Use Local Choices for values specific to a single table.
  guidelines:
  - If the same set of values is used in more than one table (e.g., Status, Priority, Category), create it as a Global Choice.
  - If the values are unique to one table and will never be reused, create a Local Choice.
  - If the set of valid values is large (more than ~25 items) or changes frequently, consider using a Lookup to a reference table instead of a Choice field.
  rationale:
  - Global Choices ensure consistency across tables. When the list is updated, the change is reflected everywhere it is used.
  - Local Choices are simpler to manage and do not impact other tables when modified.
  - Very large or frequently changing option sets are better modeled as reference tables with Lookup fields, which are easier to maintain and do not require solution deployments to update values.
  examples:
    good:
    - description: A Global Choice named Priority with values High, Medium, Low - used in the Case, Task, and Order tables.
    - description: A Local Choice named Case Origin with values Phone, Email, Web - specific to the Case table only.
    - description: A Lookup to a Product Category reference table when there are 50+ categories that change quarterly.
    bad:
    - description: Three separate Local Choices named "Priority" in the Case, Task, and Order tables, each with slightly different values (e.g., one has "Critical" and the others don't).
    - description: A Global Choice with 100+ items that requires a solution deployment every time a new value is added.
  references:
  - title: Create and edit global choices - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/maker/data-platform/create-edit-global-option-sets
- id: FLD-005
  title: Set the field requirement level deliberately based on business needs
  description: Set the field requirement level deliberately based on business needs.
  guidelines:
  - Set a field as Business Required only when the record is invalid without that value.
  - Use Business Recommended to guide users toward filling in important but not mandatory fields.
  - Default to Optional unless there is a clear business reason to require the field.
  - Avoid making too many fields required, as it slows down data entry and can frustrate users.
  rationale:
  - Business Required fields are enforced at the platform level, including during imports, API calls, and workflow-created records - not just UI forms.
  - Over-requiring fields leads to users entering placeholder or junk data (e.g., "N/A", "TBD", "123") just to save the record, reducing data quality.
  - Business Recommended provides a visual cue (blue asterisk) without blocking the save, offering a good middle ground for important but non-critical data.
  examples:
    good:
    - description: Conforms to the rule requirements.
    bad:
    - description: Violates the rule requirements.
  references:
  - title: Set managed properties for columns - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/maker/data-platform/set-managed-properties-for-field
- id: FLD-006
  title: Enable Column-Level Security for fields containing sensitive or confidential data
  description: Enable Column-Level Security for fields containing sensitive or confidential data.
  guidelines:
  - Identify fields that contain personally identifiable information (PII), financial data, or other sensitive content.
  - Create Field Security Profiles and assign them to the appropriate security roles or teams.
  - Do not overuse column-level security. Apply it only where access must be restricted beyond what row-level and table-level security provide.
  - Regularly review Field Security Profile assignments as team membership and business requirements change.
  rationale:
  - Column-level security ensures that sensitive data (e.g., Social Security Numbers, salary information, medical records) is visible only to authorized users, even if they have access to the record itself.
  - Without column-level security, any user with read access to a table can see all columns, which may violate data privacy regulations (e.g., GDPR, HIPAA).
  - Overusing column-level security can make the system harder to maintain and may impact performance due to additional security checks on every data retrieval.
  examples:
    good:
    - description: Column-level security enabled on the salary and socialsecuritynumber fields of the Employee table, with a Field Security Profile granting access only to HR team members.
    bad:
    - description: No column-level security on the Employee table, allowing any user with read access to see salary and SSN data.
    - description: Column-level security applied to 50+ fields across the system, including non-sensitive fields like first_name and email, adding unnecessary complexity.
  references:
  - title: Column-level security - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/field-level-security
