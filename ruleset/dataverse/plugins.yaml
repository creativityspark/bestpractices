topic: Plugins
description: Good practices for Dataverse C# Plugins.
rules:
- id: PLG-001
  title: Plugin class names must use a namespace-based naming convention that describes the plug...
  description: 'Plugin class names must use a namespace-based naming convention that describes the plugin''s purpose. Do not hardcode table schema names, pipeline stages, or event names into the class name, since a single plugin class can be registered on multiple tables and stages, and its configuration may change over time. Follow this pattern: ` [AppName].Plugins.[TableName (if table-specific)].[Action/Purpose] `'
  guidelines:
  - 'AppName: The name of the application or solution (e.g., CRM, Sales, FieldService).'
  - 'Plugins: A fixed namespace segment indicating the plugin layer.'
  - 'TableName *(optional)*: Include the table name as a namespace segment only when the plugin is specific to a single table.'
  - 'Action/Purpose: A descriptive class name that explains what the plugin does.'
  rationale:
  - Namespace-based naming keeps plugin classes organized and discoverable in large solutions with many plugins.
  - Avoiding table schema names and pipeline stages in the class name allows the same plugin to be registered on multiple tables, events, or stages without the name becoming misleading.
  - Plugin registration details (table, stage, event) are configured in the Plugin Registration Tool and can change independently of the code. The class name should describe *what* the plugin does, not *where* it is registered.
  examples:
    good:
    - description: CRM.Plugins.Accounts.ValidateEmail - a plugin under the CRM app namespace, specific to the Accounts table.
    - description: CRM.Plugins.Contacts.SendWelcomeNotification - specific to the Contacts table.
    - description: CRM.Plugins.EnforceBusinessHours - a cross-table plugin that applies to multiple tables.
    - description: Sales.Plugins.Orders.PreventActiveDeletion - under the Sales app namespace, specific to Orders.
    bad:
    - description: AccountPreOpUpdate_ValidateEmail - hardcodes the table schema, pipeline stage, and event into the name.
    - description: Plugin1 - meaningless, provides no context about the purpose.
    - description: AccountPlugin - too generic; does not indicate what it does.
    - description: DoStuff - no naming structure whatsoever.
  references:
  - title: Write a plug-in - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/write-plug-in
- id: PLG-002
  title: Always throw InvalidPluginExecutionException for business rule violations and validatio...
  description: Always throw InvalidPluginExecutionException for business rule violations and validation errors. Never throw generic .NET exceptions from plugin code.
  guidelines:
  - Use InvalidPluginExecutionException to communicate validation failures, business rule violations, or any condition that should cancel the operation and display a message to the user.
  - Catch unexpected exceptions and wrap them with InvalidPluginExecutionException before re-throwing, including a user-friendly message.
  - Do not include HTML, stack traces, or sensitive data in the exception message.
  rationale:
  - InvalidPluginExecutionException is the only exception type that the platform recognizes and surfaces as a user-friendly message in the UI. Generic exceptions result in an unhelpful "ISV Unexpected" error.
  - Wrapping unexpected exceptions ensures that the user and support staff receive actionable error messages instead of cryptic system errors.
  - Including sensitive data or stack traces in exception messages poses a security risk, as these messages are displayed to end users.
  examples:
    good:
    - description: Good example code snippet.
      code: "if (string.IsNullOrEmpty(email))\n{\n    throw new InvalidPluginExecutionException(\n        \"The Email field is required. Please provide a valid email address before saving.\");\n}"
      language: csharp
    - description: Good example code snippet.
      code: "try\n{\n    // Business logic\n}\ncatch (Exception ex)\n{\n    tracingService.Trace(\"Unexpected error: {0}\", ex.ToString());\n    throw new InvalidPluginExecutionException(\n        \"An unexpected error occurred while processing the record. Please contact support.\", ex);\n}"
      language: csharp
    bad:
    - description: Bad example code snippet.
      code: "// Throws a generic exception \u2014 user sees \"ISV Unexpected\" with no useful message\nthrow new Exception(\"Something went wrong\");"
      language: csharp
    - description: Bad example code snippet.
      code: '// Exposes stack trace and internal details to the end user

        throw new InvalidPluginExecutionException(ex.ToString());'
      language: csharp
  references:
  - title: Use InvalidPluginExecutionException in plug-ins - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/best-practices/business-logic/use-invalidpluginexecutionexception-plugin-workflow-activities
- id: PLG-003
  title: Always use ITracingService to log diagnostic information at key points in the plugin ex...
  description: Always use ITracingService to log diagnostic information at key points in the plugin execution flow.
  guidelines:
  - Obtain the ITracingService instance from the IServiceProvider and use it to log execution flow, input values, and error details.
  - Log at the beginning and end of the plugin, before and after key operations, and before throwing exceptions.
  - Never use Console.WriteLine, Debug.WriteLine, or any other logging mechanism - only ITracingService is supported.
  rationale:
  - ITracingService writes to the Plugin Trace Log, which is the only supported diagnostic mechanism for Dataverse plugins running in sandbox isolation.
  - Detailed trace logs are essential for diagnosing production issues, especially when you cannot attach a debugger.
  - Tracing before throwing InvalidPluginExecutionException captures the context leading to the error, making postmortem analysis significantly easier.
  examples:
    good:
    - description: Good example code snippet.
      code: "public void Execute(IServiceProvider serviceProvider)\n{\n    var tracingService = (ITracingService)serviceProvider.GetService(typeof(ITracingService));\n    tracingService.Trace(\"Plugin execution started.\");\n\n    var context = (IPluginExecutionContext)serviceProvider.GetService(typeof(IPluginExecutionContext));\n    tracingService.Trace(\"Message: {0}, Entity: {1}, Depth: {2}\",\n        context.MessageName, context.PrimaryEntityName, context.Depth);\n\n    try\n    {\n        // Business logic\n        tracingService.Trace(\"Validation passed. Updating record.\");\n    }\n    catch (Exception ex)\n    {\n        tracingService.Trace(\"Error: {0}\", ex.ToString());\n        throw new InvalidPluginExecutionException(\"An error occurred. Please contact support.\", ex);\n    }\n}"
      language: csharp
    bad:
    - description: Bad example code snippet.
      code: "// No tracing at all \u2014 impossible to diagnose issues in production\npublic void Execute(IServiceProvider serviceProvider)\n{\n    var context = (IPluginExecutionContext)serviceProvider.GetService(typeof(IPluginExecutionContext));\n    // Business logic with no trace statements\n}"
      language: csharp
    - description: Bad example code snippet.
      code: "// Using Console.WriteLine \u2014 output is lost in the Dataverse sandbox environment\nConsole.WriteLine(\"Plugin started\");"
      language: csharp
  references:
  - title: Use ITracingService in plug-ins - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/best-practices/business-logic/use-itracingservice-plugins
  - title: Debug plug-ins - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/debug-plug-in
- id: PLG-004
  title: Plugins must be stateless
  description: Plugins must be stateless. Do not use instance variables, static fields, or singletons to store data between plugin executions.
  guidelines:
  - Do not declare instance fields or static fields that hold state across executions.
  - All data needed for execution must be obtained from the IServiceProvider and the execution context within the Execute method.
  - The only safe use of class-level fields is for immutable configuration values set in the constructor from the plugin's unsecure or secure configuration strings.
  rationale:
  - The Dataverse platform may cache and reuse plugin instances across multiple executions and threads. Instance or static state can be shared unpredictably, leading to race conditions, data corruption, and hard-to-reproduce bugs.
  - Plugins are expected to execute in a thread-safe, stateless manner. Any data that persists between invocations violates this contract.
  examples:
    good:
    - description: Good example code snippet.
      code: "public class AccountPostCreate : IPlugin\n{\n    private readonly string _config; // Immutable, set once in constructor\n\n    public AccountPostCreate(string unsecureConfig, string secureConfig)\n    {\n        _config = unsecureConfig; // Safe: set once, never modified\n    }\n\n    public void Execute(IServiceProvider serviceProvider)\n    {\n        // All state is obtained from serviceProvider\n        var context = (IPluginExecutionContext)serviceProvider.GetService(typeof(IPluginExecutionContext));\n        var target = (Entity)context.InputParameters[\"Target\"];\n        // Process target...\n    }\n}"
      language: csharp
    bad:
    - description: Bad example code snippet.
      code: "public class AccountPostCreate : IPlugin\n{\n    private int _executionCount = 0; // Shared across threads \u2014 race condition\n    private Entity _lastProcessedEntity; // Leaks data between executions\n\n    public void Execute(IServiceProvider serviceProvider)\n    {\n        _executionCount++;\n        _lastProcessedEntity = (Entity)context.InputParameters[\"Target\"];\n    }\n}"
      language: csharp
  references:
  - title: Write a plug-in - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/write-plug-in
  - title: Best practices for plug-in and workflow development - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/best-practices/business-logic
- id: PLG-005
  title: Design plugins to be idempotent instead of relying on execution depth checks
  description: Design plugins to be idempotent instead of relying on execution depth checks.
  guidelines:
  - Ensure that running the plugin multiple times with the same input produces the same result without unwanted side effects.
  - Before modifying a record, check whether the change is actually needed (e.g., compare current vs. desired values). Skip the update if the record is already in the correct state.
  - Do not use IPluginExecutionContext.Depth as a control flow mechanism. Depth checks mask underlying design issues and can silently suppress legitimate nested executions.
  rationale:
  - An idempotent plugin is safe to execute at any depth because it only makes changes when they are truly needed, naturally preventing infinite loops.
  - Depth checks are fragile - they assume a specific call chain. When new plugins or workflows are added to the pipeline, the expected depth may change, causing the check to incorrectly skip or execute logic.
  - Relying on depth checks can hide recursive update patterns that should be fixed at the design level rather than worked around at runtime.
  examples:
    good:
    - description: Good example code snippet.
      code: "public void Execute(IServiceProvider serviceProvider)\n{\n    var context = (IPluginExecutionContext)serviceProvider.GetService(typeof(IPluginExecutionContext));\n    var service = ((IOrganizationServiceFactory)serviceProvider.GetService(typeof(IOrganizationServiceFactory)))\n        .CreateOrganizationService(context.UserId);\n\n    var target = (Entity)context.InputParameters[\"Target\"];\n    var current = service.Retrieve(target.LogicalName, target.Id, new ColumnSet(\"description\"));\n\n    var currentDescription = current.GetAttributeValue<string>(\"description\");\n    var desiredDescription = \"Updated by plugin\";\n\n    // Only update if the value is not already set \u2014 prevents re-triggering\n    if (currentDescription != desiredDescription)\n    {\n        var update = new Entity(target.LogicalName, target.Id);\n        update[\"description\"] = desiredDescription;\n        service.Update(update);\n    }\n}"
      language: csharp
    bad:
    - description: Bad example code snippet.
      code: "public void Execute(IServiceProvider serviceProvider)\n{\n    var context = (IPluginExecutionContext)serviceProvider.GetService(typeof(IPluginExecutionContext));\n\n    // Fragile: assumes depth will always be 1 on the first trigger\n    if (context.Depth > 1)\n    {\n        return;\n    }\n\n    var service = ((IOrganizationServiceFactory)serviceProvider.GetService(typeof(IOrganizationServiceFactory)))\n        .CreateOrganizationService(context.UserId);\n\n    // Unconditionally updates the record, which triggers this plugin again\n    var target = (Entity)context.InputParameters[\"Target\"];\n    target[\"description\"] = \"Updated by plugin\";\n    service.Update(target);\n}"
      language: csharp
  references:
  - title: IPluginExecutionContext.Depth Property - Microsoft Learn
    url: https://learn.microsoft.com/en-us/dotnet/api/microsoft.xrm.sdk.ipluginexecutioncontext.depth
  - title: Best practices for plug-in and workflow development - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/best-practices/business-logic
- id: PLG-006
  title: Never use new ColumnSet(true) when retrieving records
  description: Never use new ColumnSet(true) when retrieving records. Always specify only the columns you need.
  guidelines:
  - When calling Retrieve or RetrieveMultiple, explicitly list the required columns using new ColumnSet("column1", "column2").
  - Never pass true to the ColumnSet constructor, as this retrieves all columns on the table.
  rationale:
  - Retrieving all columns incurs unnecessary database load, increases memory consumption, and degrades plugin performance.
  - Tables evolve over time - new columns may be added that increase payload size or that the plugin's security context is not authorized to read, potentially causing runtime errors.
  - Specifying only the needed columns makes the plugin's data requirements explicit and self-documenting.
  examples:
    good:
    - description: Good example code snippet.
      code: var account = service.Retrieve("account", accountId, new ColumnSet("name", "emailaddress1"));
      language: csharp
    - description: Good example code snippet.
      code: "var query = new QueryExpression(\"contact\")\n{\n    ColumnSet = new ColumnSet(\"firstname\", \"lastname\", \"emailaddress1\")\n};\nquery.Criteria.AddCondition(\"statecode\", ConditionOperator.Equal, 0);\nvar contacts = service.RetrieveMultiple(query);"
      language: csharp
    bad:
    - description: Bad example code snippet.
      code: "// Retrieves ALL columns \u2014 wasteful and fragile\nvar account = service.Retrieve(\"account\", accountId, new ColumnSet(true));"
      language: csharp
    - description: Bad example code snippet.
      code: "var query = new QueryExpression(\"contact\")\n{\n    ColumnSet = new ColumnSet(true) // All columns fetched for every contact\n};\nvar contacts = service.RetrieveMultiple(query);"
      language: csharp
  references:
  - title: Do not retrieve Entity all columns via query APIs - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/best-practices/work-with-data/retrieve-specific-columns-entity-via-query-apis
- id: PLG-007
  title: Use pre-images and post-images instead of issuing additional Retrieve calls to access f...
  description: Use pre-images and post-images instead of issuing additional Retrieve calls to access field values before or after the operation.
  guidelines:
  - Register entity images (pre-image and/or post-image) on the plugin step in the Plugin Registration Tool with only the attributes you need.
  - Access images via context.PreEntityImages and context.PostEntityImages.
  - Always check that the image exists before accessing it.
  rationale:
  - Entity images are loaded by the platform as part of the pipeline and do not incur an additional Retrieve call to the database, improving plugin performance.
  - Pre-images provide the field values before the operation, which is essential for comparison logic (e.g., detecting field changes).
  - Registering only the needed attributes in the image reduces the data payload and keeps the plugin efficient.
  examples:
    good:
    - description: Good example code snippet.
      code: "if (context.PreEntityImages.Contains(\"PreImage\"))\n{\n    var preImage = context.PreEntityImages[\"PreImage\"];\n    var previousStatus = preImage.GetAttributeValue<OptionSetValue>(\"statuscode\");\n    var currentStatus = target.GetAttributeValue<OptionSetValue>(\"statuscode\");\n\n    if (previousStatus?.Value != currentStatus?.Value)\n    {\n        tracingService.Trace(\"Status changed from {0} to {1}.\", previousStatus?.Value, currentStatus?.Value);\n        // Handle status change\n    }\n}"
      language: csharp
    bad:
    - description: Bad example code snippet.
      code: '// Issues an unnecessary Retrieve call to get the previous value

        var previousRecord = service.Retrieve("account", target.Id, new ColumnSet("statuscode"));

        var previousStatus = previousRecord.GetAttributeValue<OptionSetValue>("statuscode");'
      language: csharp
  references:
  - title: Define entity images - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/register-plug-in#define-entity-images
  - title: Best practices for plug-in and workflow development - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/best-practices/business-logic
- id: PLG-008
  title: Register plugins in the correct pipeline stage based on the type of logic they perform
  description: Register plugins in the correct pipeline stage based on the type of logic they perform.
  guidelines:
  - Use Pre-Validation for lightweight checks that should run before the database transaction begins (e.g., permission checks, canceling invalid operations).
  - Use Pre-Operation for logic that must modify the target entity's data before it is saved to the database (e.g., setting default values, computed fields).
  - Use Post-Operation for logic that must execute after the record has been committed (e.g., creating related records, sending notifications, audit logging).
  rationale:
  - Pre-Validation plugins run outside the database transaction, so rejecting an operation at this stage avoids starting and rolling back a transaction unnecessarily.
  - Pre-Operation plugins can modify the Target entity directly, and the changes are included in the same database transaction - no additional Update call is needed.
  - Post-Operation plugins have access to the final state of the record (including auto-generated fields like the record ID on Create), making them the correct stage for dependent operations.
  examples:
    good:
    - description: Good example code snippet.
      code: "// Pre-Validation: reject deletion of active orders early, before the transaction starts\nif (context.MessageName == \"Delete\")\n{\n    var preImage = context.PreEntityImages[\"PreImage\"];\n    if (preImage.GetAttributeValue<OptionSetValue>(\"statecode\")?.Value == 0)\n    {\n        throw new InvalidPluginExecutionException(\"Active orders cannot be deleted.\");\n    }\n}"
      language: csharp
    - description: Good example code snippet.
      code: "// Pre-Operation: set a computed field before the record is saved\nvar target = (Entity)context.InputParameters[\"Target\"];\ntarget[\"fullname\"] = $\"{target.GetAttributeValue<string>(\"firstname\")} {target.GetAttributeValue<string>(\"lastname\")}\";\n// No Update call needed \u2014 changes are saved as part of the transaction"
      language: csharp
    bad:
    - description: Bad example code snippet.
      code: "// Post-Operation: modifying the target and calling Update \u2014 extra database round-trip\n// This should have been done in Pre-Operation\nvar target = (Entity)context.InputParameters[\"Target\"];\ntarget[\"fullname\"] = $\"{target[\"firstname\"]} {target[\"lastname\"]}\";\nservice.Update(target); // Unnecessary Update call"
      language: csharp
  references:
  - title: Event execution pipeline - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/event-framework
  - title: Write a plug-in - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/write-plug-in
- id: PLG-009
  title: Do not use ExecuteMultipleRequest inside plugin code
  description: Do not use ExecuteMultipleRequest inside plugin code. Use it only from external client applications.
  guidelines:
  - When a plugin needs to create or update multiple records, use individual IOrganizationService calls within the plugin.
  - Reserve ExecuteMultipleRequest for external integrations, data migration tools, and client-side batch operations.
  rationale:
  - ExecuteMultipleRequest inside a plugin can cause recursive triggers, bypass depth tracking, and lead to unexpected behavior in the pipeline.
  - Each operation within an ExecuteMultiple call may trigger its own set of plugins and workflows, compounding execution time and potentially exceeding the 2-minute timeout for synchronous plugins.
  - ExecuteMultipleRequest is designed for client-side batching to reduce network round-trips. Inside a plugin, network latency is not a factor since the call is already executing on the server.
  examples:
    good:
    - description: Good example code snippet.
      code: "// Create related records individually inside the plugin\nforeach (var detail in orderDetails)\n{\n    var entity = new Entity(\"orderdetail\");\n    entity[\"productid\"] = detail.ProductId;\n    entity[\"quantity\"] = detail.Quantity;\n    entity[\"salesorderid\"] = new EntityReference(\"salesorder\", orderId);\n    service.Create(entity);\n}"
      language: csharp
    bad:
    - description: Bad example code snippet.
      code: "// Using ExecuteMultiple inside a plugin \u2014 risk of recursion and timeouts\nvar request = new ExecuteMultipleRequest\n{\n    Requests = new OrganizationRequestCollection(),\n    Settings = new ExecuteMultipleSettings { ContinueOnError = false, ReturnResponses = true }\n};\nforeach (var detail in orderDetails)\n{\n    request.Requests.Add(new CreateRequest { Target = detail });\n}\nservice.Execute(request); // Avoid this inside plugins"
      language: csharp
  references:
  - title: Do not use batch request types in plug-ins and workflow activities - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/best-practices/business-logic/do-not-use-batch-request-types-in-plug-ins-and-workflow-activities
- id: PLG-010
  title: Register plugins only for the specific messages and tables required
  description: Register plugins only for the specific messages and tables required. Register only the filtering attributes necessary for Update messages.
  guidelines:
  - Do not register a plugin on all entities or all messages if it only applies to specific ones.
  - When registering on the Update message, specify filtering attributes so the plugin only fires when relevant fields change.
  - Limit plugin step registration to the minimum scope needed.
  rationale:
  - Unnecessary plugin registrations add overhead to every operation on the registered table, even when the plugin logic does not apply.
  - Filtering attributes on Update steps prevent the plugin from executing on every field change, significantly reducing unnecessary executions.
  - A narrower registration scope makes the system more predictable and easier to debug.
  examples:
    good:
    - description: A plugin registered on the Update message of the Account table with filtering attributes set to emailaddress1, statuscode - it only fires when the email or status changes.
    bad:
    - description: A plugin registered on the Update message of the Account table with no filtering attributes - it fires on every single field update, including irrelevant changes like modifying the description.
    - description: A plugin registered on all messages of a table when it only needs to run on Create.
  references:
  - title: Register a plug-in - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/register-plug-in
- id: PLG-011
  title: Do not use multithreading, Task
  description: Do not use multithreading, Task.Run, Parallel.ForEach, or any form of asynchronous parallelism inside plugin code.
  guidelines:
  - All plugin logic must execute synchronously on the calling thread.
  - Do not use Task, Thread, Parallel, async/await, or ThreadPool inside plugins.
  rationale:
  - Dataverse plugins execute in a sandboxed environment with strict resource constraints. The platform does not support multithreading, and spawning threads can cause crashes, data corruption, or unpredictable behavior.
  - Background threads may outlive the plugin execution context, losing access to the IOrganizationService, ITracingService, and other platform services.
  - The sandbox environment may terminate threads at any time without warning, leading to partially completed operations.
  examples:
    good:
    - description: Good example code snippet.
      code: "// Sequential processing \u2014 safe and predictable\nforeach (var record in recordsToProcess)\n{\n    service.Update(record);\n}"
      language: csharp
    bad:
    - description: Bad example code snippet.
      code: "// Parallel processing inside a plugin \u2014 unstable and unsupported\nParallel.ForEach(recordsToProcess, record =>\n{\n    service.Update(record);\n});"
      language: csharp
    - description: Bad example code snippet.
      code: "// async/await inside a plugin \u2014 not supported in the sandbox\nawait Task.Run(() => service.Update(record));"
      language: csharp
  references:
  - title: Plug-in design best practices - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/best-practices/business-logic
- id: PLG-012
  title: Keep synchronous plugins lightweight
  description: Keep synchronous plugins lightweight. Offload long-running or non-critical work to asynchronous plugins or Power Automate flows.
  guidelines:
  - Synchronous plugins (Pre-Validation, Pre-Operation, Post-Operation synchronous) block the user's save operation. Keep execution time to a minimum.
  - Move non-critical processing such as notifications, audit logging, and external API calls to asynchronous (Post-Operation Async) plugin steps or Power Automate flows.
  - Be aware of the 2-minute timeout limit for synchronous plugins.
  rationale:
  - Synchronous plugins execute within the user's request pipeline. Slow plugins cause the UI to freeze, resulting in a poor user experience.
  - If a synchronous plugin exceeds the 2-minute timeout, the entire operation fails and rolls back, potentially causing data loss.
  - Asynchronous processing decouples the user experience from background work, improving responsiveness without sacrificing functionality.
  examples:
    good:
    - description: A synchronous Pre-Operation plugin that validates a field format - executes in milliseconds.
    - description: An asynchronous Post-Operation plugin that sends an email notification after a Case is created.
    bad:
    - description: "A synchronous Post-Operation plugin that calls an external REST API to validate an address, adding 3\u20135 seconds of network latency to every save."
    - description: A synchronous plugin that processes 500 related records in a loop, causing a 30-second delay on the form.
  references:
  - title: Best practices for plug-in and workflow development - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/best-practices/business-logic
  - title: Troubleshoot plug-ins - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/troubleshoot-plug-in
