topic: Security Roles
description: Good practices for Dataverse Security Roles.
rules:
- id: SEC-001
  title: Never modify out-of-the-box (OOB) security roles
  description: Never modify out-of-the-box (OOB) security roles. Always create custom security roles tailored to your organization's needs.
  guidelines:
  - Do not edit system roles such as System Administrator, System Customizer, or Basic User.
  - When you need a role similar to an existing OOB role, copy it and customize the copy.
  - Use a consistent naming convention for custom roles that includes the publisher prefix and the business function (e.g., cspSalesManager, cspFinanceAnalyst).
  - Avoid generic names like Custom Role 1 or New Role.
  rationale:
  - Out-of-the-box roles may be overwritten or reset during platform updates, causing unexpected permission changes.
  - Modifying OOB roles makes it difficult to troubleshoot issues because the baseline behavior is no longer known.
  - Custom roles are included in solutions and can be promoted across environments in a controlled manner.
  - A clear naming convention makes it easier to identify the purpose of each role when managing security across multiple environments.
  examples:
    good:
    - description: A custom role named cspAccountManager created by copying the Salesperson role and removing unnecessary privileges such as marketing list management.
    - description: A custom role named cspReadOnly_Auditor with only Read privileges on business data tables, used for compliance reviews.
    bad:
    - description: Editing the OOB Salesperson role directly to remove privileges, which may be overwritten in the next platform update.
    - description: A custom role named Role1 with no indication of its purpose or target audience.
  references:
  - title: Security roles and privileges - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/security-roles-privileges
  - title: Create or edit a security role - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/maker/data-platform/create-edit-security-role
- id: SEC-002
  title: Apply the Principle of Least Privilege when assigning security role permissions
  description: Apply the Principle of Least Privilege when assigning security role permissions.
  guidelines:
  - Grant users only the minimum privileges required to perform their job functions.
  - Start with no permissions and add only what is needed, rather than starting with full access and removing privileges.
  - Restrict the System Administrator role to a small number of core administrators. Never assign it for convenience.
  - For service accounts and integrations, create dedicated roles with only the API-level permissions required for the specific tables and operations involved.
  rationale:
  - Over-privileged users can accidentally or intentionally modify or delete data they should not have access to.
  - Restricting access reduces the blast radius of compromised accounts or misconfigured automations.
  - Granting System Administrator to non-admin users bypasses all security controls and audit boundaries, creating compliance risks.
  - Service accounts with broad permissions are a common attack vector. Limiting them to specific tables and operations reduces risk.
  examples:
    good:
    - description: Conforms to the rule requirements.
    bad:
    - description: Violates the rule requirements.
  references:
  - title: Dataverse security best practices - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/data-platform-security-best-practices
  - title: Security roles and privileges - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/security-roles-privileges
- id: SEC-003
  title: Assign security roles to teams instead of individual users whenever possible
  description: Assign security roles to teams instead of individual users whenever possible.
  guidelines:
  - Use Owner Teams to group users by business function or department and assign security roles to the team.
  - Use Azure AD Group Teams to automatically sync membership from Azure Active Directory security groups into Dataverse teams with assigned roles.
  - Use Access Teams for sharing individual records with ad-hoc groups of users without granting broad table-level permissions.
  - Reserve direct user-level role assignments for exceptional cases only, and document the reason.
  rationale:
  - Assigning roles to teams reduces administrative overhead. When a user joins or leaves a team, their permissions update automatically.
  - Azure AD Group Teams eliminate manual user management in Dataverse by leveraging the organization's existing identity infrastructure.
  - Direct user-level assignments are difficult to audit and maintain at scale, especially when users change roles or leave the organization.
  - Access Teams provide a lightweight mechanism for record-level sharing without inflating the number of security roles.
  examples:
    good:
    - description: An Owner Team named Sales Team - North America with the cspSalesRep role assigned. New sales reps are added to the team and immediately inherit the correct permissions.
    - description: An Azure AD Group Team linked to the Finance Department security group in Azure AD, with the cspFinanceAnalyst role assigned. User membership is managed centrally in Azure AD.
    bad:
    - description: Each of the 50 sales reps has the cspSalesRep role assigned directly to their user record. When the role changes, all 50 assignments must be updated manually.
    - description: An Access Team used to grant broad table-level Read/Write permissions instead of sharing individual records.
  references:
  - title: Manage teams - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/manage-teams
  - title: Manage group teams - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/manage-group-teams
- id: SEC-004
  title: 'Separate security roles by functional purpose: one set for application access and anoth...'
  description: 'Separate security roles by functional purpose: one set for application access and another for data access.'
  guidelines:
  - Create application roles that control which model-driven apps, dashboards, and navigation areas a user can see.
  - 'Create data roles that control CRUD (Create, Read, Update, Delete) permissions on specific tables and at specific access levels (User, Business Unit, Parent: Child, Organization).'
  - Combine application and data roles by assigning both to the same user or team, rather than merging all privileges into a single role.
  rationale:
  - Mixing application navigation and data access privileges into one role leads to overly complex roles that are difficult to understand, test, and maintain.
  - Separating concerns allows you to reuse data roles across different apps and reuse app roles across different data access levels.
  - When troubleshooting access issues, smaller and focused roles make it easier to identify which role is granting or blocking a specific privilege.
  examples:
    good:
    - value: A user has two roles
      note: cspCRMAppAccess (grants access to the CRM model-driven app and its sitemap areas) and cspAccountManagerData (grants Read/Write on Account, Contact, and Opportunity at the Business Unit level).
    - description: When a new model-driven app is introduced, a new app access role is created without modifying existing data roles.
    bad:
    - description: A single role cspCRMFull that includes app access, table CRUD permissions, and custom entity permissions all in one. Changing a data permission requires editing a role that also controls app navigation.
    - description: Five nearly identical roles that differ only in which app they grant access to, each duplicating the same data permissions.
  references:
  - title: Security roles and privileges - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/security-roles-privileges
- id: SEC-005
  title: 'Set the appropriate access level (User, Business Unit, Parent: Child Business Units, Or...'
  description: 'Set the appropriate access level (User, Business Unit, Parent: Child Business Units, Organization) for each privilege deliberately.'
  guidelines:
  - Default to User level access unless there is a clear business requirement for broader visibility.
  - Use Business Unit level when users need to see records owned by anyone in their department.
  - 'Use Parent: Child Business Units when managers need visibility into their own and subordinate departments.'
  - Use Organization level only for reference data or scenarios where all users must see all records.
  rationale:
  - Access levels are often set to Organization by default for convenience, which exposes data across the entire organization and defeats the purpose of row-level security.
  - Overly broad access levels can violate data privacy regulations and internal data governance policies.
  - Choosing the correct access level ensures that the business unit and team hierarchy is leveraged to control data visibility without additional customization.
  examples:
    good:
    - description: Conforms to the rule requirements.
    bad:
    - description: Violates the rule requirements.
  references:
  - title: Security roles and privileges - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/security-roles-privileges
  - title: Dataverse security best practices - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/data-platform-security-best-practices
- id: SEC-006
  title: Review and audit security role assignments on a regular schedule
  description: Review and audit security role assignments on a regular schedule.
  guidelines:
  - Establish a periodic review cycle (e.g., quarterly) to validate that all role assignments are still appropriate.
  - Remove security roles from users who have changed positions or left the organization.
  - Identify and eliminate role sprawl by consolidating roles that have overlapping or redundant privileges.
  - Use the Dataverse audit log and the Power Platform Admin Center to monitor privileged operations and detect anomalies.
  rationale:
  - User responsibilities change over time, and stale role assignments lead to privilege creep - users accumulating more access than they need.
  - Former employees or contractors who retain active security roles represent a significant security risk.
  - Uncontrolled role proliferation makes the security model harder to understand, test, and enforce.
  - Regular audits are often required for compliance with standards such as SOC 2, ISO 27001, and GDPR.
  examples:
    good:
    - description: A quarterly review process where the security team exports all user-role assignments, compares them against the HR system of record, and removes stale assignments.
    - description: A documented role matrix mapping each security role to the job titles and departments that should hold it, used as the baseline for each review.
    bad:
    - description: No review process in place. A user who moved from Finance to Marketing two years ago still has the cspFinanceAdmin role.
    - description: 30 custom security roles exist in the environment, but no one can explain the difference between cspSalesUser, cspSalesAccess, and cspSalesBasic.
  references:
  - title: Auditing overview - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/manage-dataverse-auditing
  - title: View user access with security role checker - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/database-security
- id: SEC-007
  title: Test security roles in a non-production environment before deploying to production
  description: Test security roles in a non-production environment before deploying to production.
  guidelines:
  - Create test user accounts (or use the impersonation feature) with only the security roles being tested - never test with an administrator account.
  - Validate all CRUD operations, app access, dashboard visibility, and form behavior for each role.
  - Test both positive scenarios (user can do what they should) and negative scenarios (user cannot do what they should not).
  - Include security role testing as part of your solution deployment checklist.
  rationale:
  - Security misconfigurations are difficult to detect through code review alone. Runtime testing with realistic accounts is the only reliable way to validate effective permissions.
  - Testing with an administrator account masks permission issues because administrators bypass all security checks.
  - Catching security gaps in development or test environments prevents data exposure incidents in production.
  examples:
    good:
    - description: A test user named testsalesrep@contoso.com with only the cspSalesRep role, used to verify that the user can create and edit Opportunities but cannot delete Accounts.
    - value: A test checklist that includes
      note: '"Verify that the Finance Viewer role cannot export data from the Employee table."'
    bad:
    - description: Testing all security roles by logging in as System Administrator and assuming "it works for everyone."
    - description: Deploying a new security role to production without testing, resulting in 200 users losing access to critical forms on a Monday morning.
  references:
  - title: Environments overview - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/environments-overview
  - title: Security roles and privileges - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/security-roles-privileges
