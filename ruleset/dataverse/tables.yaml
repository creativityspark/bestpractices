topic: Tables
description: Good practices for Dataverse Tables.
rules:
- id: TAB-001
  title: 'Naming rules:'
  description: 'Naming rules:'
  guidelines:
  - The *Snake Case* notation must be used in the Schema Name.
  - Avoid abbreviations in the Display Name or Schema Name as much as possible.
  - Make sure the plural name is appropriate.
  - If the table represents a relationship or hierarchy, include the parent table name in the Display Name and Schema Name.
  - The *Display Name* must be unique in the Dataverse environment.
  - If you need to use the same name as a system table, rename the system table with the OOTB (Out-of-the-box) prefix.
  rationale:
  - The Snake Case syntax facilitates reading the name and is aligned with the underscore character used between the publisher prefix and the name. It makes clear that the name refers to a table in the C# or TypeScript early bound generated code.
  - Abbreviations are not always understood by everybody.
  - The plural name is auto-generated by the application and is sometimes incorrect.
  - Including the parent table in the table name makes the purpose of the table more obvious.
  - Duplicated Display Names make it difficult to distinguish one table from another in Advanced Find, the list of tables, solutions, etc.
  examples:
    good:
    - description: Conforms to the rule requirements.
    bad:
    - description: Violates the rule requirements.
  references:
  - title: Dataverse and Model-Driven Apps Standards and Naming Conventions
    url: https://docs.microsoft.com/en-us/microsoft-365/community/cds-and-model-driven-apps-standards-and-naming-conventions
  - title: Illustrated guide to entity creation in Dynamics CRM
    url: https://crmtipoftheday.com/646/illustrated-guide-to-entity-creation-in-dynamics-crm
- id: TAB-002
  title: Avoid creating new custom tables to replace existing system tables
  description: Avoid creating new custom tables to replace existing system tables. If you need to do so, rename the system table with the OOTB prefix.
  guidelines:
  - Avoid creating new custom tables to replace existing system tables. If you need to do so, rename the system table with the OOTB prefix.
  rationale:
  - Although the existing tables may not provide all the functionality required, it usually requires less effort to adapt them to your needs instead of creating them from scratch.
  - Creating a table requires many other considerations that are often missed, such as alternate keys, relationships, views, and icons. Using an out-of-the-box table saves you from having to implement all of those.
  examples:
    good:
    - description: Conforms to the rule requirements.
    bad:
    - description: Violates the rule requirements.
  references:
  - title: When to use standard tables, and when to create new tables
    url: https://docs.microsoft.com/en-us/learn/modules/get-started-with-powerapps-common-data-service/2-learn-about-entities
- id: TAB-003
  title: Every table must have an icon configured
  description: 'Every table must have an icon configured. The selected icon must be made available in .svg format as a web resource in the solution. There are many sites providing access to free SVG icons. The ones below are just a suggestion:'
  guidelines:
  - https://uifabricicons.azurewebsites.net/
  - https://www.svgrepo.com/
  - https://freeicons.io/
  rationale:
  - Table icons are used in many places in the UI, and when they are not set, it gives a sense of an unfinished or unpolished product. No matter how small your table is, it is always recommended to add an icon, and it takes only a few minutes.
  examples:
    good:
    - description: Conforms to the rule requirements.
    bad:
    - description: Violates the rule requirements.
  references:
  - title: Microsoft Learn - Power Platform Documentation
    url: https://learn.microsoft.com/en-us/power-platform/
- id: TAB-004
  title: Choose the appropriate ownership type for each table based on the security requirements
  description: Choose the appropriate ownership type for each table based on the security requirements.
  guidelines:
  - Use User or Team ownership for tables that require row-level security (e.g., records where access should differ per user or team).
  - Use Organization ownership for reference or master data tables where all users should have the same access (e.g., country lists, product catalogs, configuration tables).
  rationale:
  - User or Team ownership enables row-level security through Dataverse security roles, allowing fine-grained access control.
  - Organization-owned tables are simpler to manage and have slightly better performance since the security engine does not need to evaluate row-level access.
  - Changing ownership type after a table is created is not supported, so choosing the correct type upfront avoids having to recreate the table.
  examples:
    good:
    - description: Conforms to the rule requirements.
    bad:
    - description: Violates the rule requirements.
  references:
  - title: Table ownership - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/maker/data-platform/types-of-entities
- id: TAB-005
  title: Enable auditing only on tables and columns where tracking changes is required by busine...
  description: Enable auditing only on tables and columns where tracking changes is required by business or compliance needs.
  guidelines:
  - Do not enable auditing on all tables by default.
  - Identify which tables contain sensitive or business-critical data and enable auditing only for those.
  - Within audited tables, enable auditing only on columns that need to be tracked.
  - Periodically review and clean up audit logs to manage storage.
  rationale:
  - Auditing every table and column generates large volumes of data that consumes storage and can impact performance.
  - Selective auditing ensures that meaningful change history is captured without unnecessary overhead.
  - Audit log retention must be managed to comply with data retention policies and control storage costs.
  examples:
    good:
    - description: Auditing enabled on the Customer table for the credit_limit, status, and owner columns because financial and ownership changes must be tracked.
    - description: Auditing enabled on the Order table for orderstatus and totalamount to support compliance requirements.
    bad:
    - description: Auditing enabled on all tables and all columns "just in case", resulting in excessive storage usage and no clear audit strategy.
    - description: Auditing enabled on the Country reference table where values rarely change and tracking is not required.
  references:
  - title: Auditing overview - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/manage-dataverse-auditing
  - title: Configure tables and columns for auditing - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/admin/manage-dataverse-auditing
- id: TAB-006
  title: Define alternate keys for tables that participate in data integration or migration scen...
  description: Define alternate keys for tables that participate in data integration or migration scenarios.
  guidelines:
  - Use alternate keys on fields that external systems use as unique identifiers (e.g., external IDs, codes, SKUs).
  - Only define alternate keys on fields whose values are immutable or rarely change.
  - Limit the number of alternate keys per table to avoid unnecessary index overhead.
  rationale:
  - Alternate keys allow external systems to reference Dataverse records without needing the internal GUID, simplifying integrations and upsert operations.
  - Each alternate key creates an additional database index. Too many keys can negatively impact write performance.
  - If an alternate key is defined on a field whose value changes frequently, it can cause key violations and integration failures.
  examples:
    good:
    - description: An external_id alternate key on the Customer table, mapped to the ERP system's customer number, used for upsert operations during data synchronization.
    - description: A composite alternate key on product_code and region for the Price List Item table to ensure unique pricing per region.
    bad:
    - description: An alternate key on the full_name field of the Contact table, which is not unique and changes when contacts update their names.
    - description: Defining five or more alternate keys on a single table without a clear integration requirement.
  references:
  - title: Define alternate keys - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/maker/data-platform/define-alternate-keys-portal
- id: TAB-007
  title: Configure relationship cascade behaviors deliberately instead of relying on the default...
  description: Configure relationship cascade behaviors deliberately instead of relying on the default settings.
  guidelines:
  - Review the cascade behavior for Assign, Share, Unshare, Reparent, Delete, and Merge on every relationship.
  - Use Restrict or Remove Link for Delete behavior unless cascading deletes are explicitly required.
  - Avoid Cascade All unless child records must always follow the parent for all actions.
  - Document the chosen cascade behavior and the reasoning behind it.
  rationale:
  - Default cascade settings may cause unintended mass updates, deletions, or reassignments when a parent record is modified.
  - Cascading deletes on large hierarchies can cause long-running transactions and timeouts.
  - Using Restrict on delete forces users to manually handle child records before deleting a parent, preventing accidental data loss.
  - Explicit cascade configuration ensures predictable system behavior and avoids surprises during production use.
  examples:
    good:
    - description: Conforms to the rule requirements.
    bad:
    - description: Violates the rule requirements.
  references:
  - title: Configure relationship cascade behavior - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/maker/data-platform/create-edit-entity-relationships-portal
- id: TAB-008
  title: Every table must have a description that explains its purpose and the type of data it s...
  description: Every table must have a description that explains its purpose and the type of data it stores.
  guidelines:
  - 'State the purpose: Explain what the table represents in one or two sentences.'
  - 'Identify the data scope: Clarify whether the table holds transactional data, reference data, configuration data, or relationship data.'
  - 'Note related tables: Mention key parent or child relationships if they are central to understanding the table''s role.'
  rationale:
  - Descriptions provide immediate context when browsing tables in the solution or in the Dataverse designer, reducing the risk of creating duplicate tables or misusing existing ones.
  - As the number of custom tables grows, descriptions become essential for onboarding new developers and understanding the data model.
  - Clear descriptions help data architects and administrators make informed decisions about security, auditing, and retention policies.
  examples:
    good:
    - description: '"Stores customer product purchases. Each record represents a single product purchased by a customer. Related to the Customer and Product tables via lookup fields."'
    - description: '"Reference table for country codes. Organization-owned. Used as a lookup across multiple tables including Customer, Supplier, and Shipping Address."'
    bad:
    - description: '"Table 1" - meaningless, provides no context.'
    - description: No description at all - developers must inspect the table's fields and relationships to understand its purpose.
  references:
  - title: Create and edit tables - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/maker/data-platform/create-edit-entities-portal
