topic: Web Resources
description: Good practices for Dataverse Web Resources.
rules:
- id: WR-001
  title: Use a consistent naming convention with virtual folder structures for all web resources
  description: Use a consistent naming convention with virtual folder structures for all web resources.
  guidelines:
  - Always start the name with the publisher prefix followed by a forward slash.
  - Group web resources by type using virtual folders (e.g., js/, html/, css/, img/).
  - Within each type folder, group by entity or feature.
  - Use camelCase or lowercase for file names. Avoid spaces and special characters.
  - Keep the folder hierarchy shallow - no more than 3 levels deep.
  rationale:
  - A consistent naming convention makes it easy to locate and manage web resources as the solution grows.
  - Virtual folder structures simulate a file system within Dataverse, improving organization and discoverability.
  - Grouping by entity or feature ensures that related resources are located together, simplifying maintenance.
  - Deep nesting makes navigation difficult and names excessively long.
  examples:
    good:
    - description: Good example code snippet.
      code: 'contoso_/js/account/formEvents.js

        contoso_/js/contact/phoneValidation.js

        contoso_/js/lib/utilities.js

        contoso_/html/account/quickView.html

        contoso_/css/common.css

        contoso_/img/icons/phone.svg'
      language: Plain Text
    bad:
    - description: Bad example code snippet.
      code: 'new_script1.js

        new_script2.js

        accountformeventsvalidationandribbon.js

        contoso_/js/features/module1/submodule2/helpers/internal/utils.js'
      language: Plain Text
  references:
  - title: Web resources in model-driven apps - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/model-driven-apps/web-resources
- id: WR-002
  title: Every web resource must have a display name and a description that explain its purpose...
  description: Every web resource must have a display name and a description that explain its purpose and usage.
  guidelines:
  - Set a clear Display Name that describes what the web resource does.
  - Write a Description that includes the entity or feature it supports, the events it handles, and any dependencies on other web resources.
  - If the web resource is a shared library, list the web resources that depend on it.
  rationale:
  - Dataverse solutions can contain hundreds of web resources. Without display names and descriptions, it is difficult to determine the purpose of each resource.
  - Descriptions reduce the risk of accidental modification or deletion by making the resource's usage and dependencies clear.
  - Good metadata helps onboard new developers and simplifies solution maintenance.
  examples:
    good:
    - value: Display Name
      note: Account Form Events
    - value: Description
      note: Handles OnLoad, OnSave, and OnChange events for the Account main form. Depends on contoso\/js/lib/utilities.js. Registered on the Account Main Form._
    bad:
    - value: Display Name
      note: Script1
    - value: Description
      note: (empty)
  references:
  - title: Create or edit web resources - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/model-driven-apps/create-edit-web-resources
- id: WR-003
  title: Sanitize all user input and dynamic data rendered in HTML web resources to prevent Cros...
  description: Sanitize all user input and dynamic data rendered in HTML web resources to prevent Cross-Site Scripting (XSS).
  guidelines:
  - Never use innerHTML to render user-supplied or entity data. Use textContent or DOM APIs to create elements safely.
  - Do not use eval(), new Function(), or setTimeout/setInterval with string arguments.
  - If you must render HTML from dynamic data, use a sanitization library such as DOMPurify.
  - Add a Content Security Policy <meta> tag to your HTML web resources to restrict script and style sources.
  rationale:
  - Dataverse records may contain data entered by external users or imported from other systems. This data could contain malicious scripts.
  - XSS vulnerabilities can lead to session hijacking, data theft, or unauthorized actions performed on behalf of the logged-in user.
  - A Content Security Policy provides an additional layer of defense by restricting which resources the browser is allowed to load and execute.
  examples:
    good:
    - description: Good example code snippet.
      code: "<meta http-equiv=\"Content-Security-Policy\"\n      content=\"default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'\">"
      language: html
    - description: Good example code snippet.
      code: "// Using textContent to safely render data\nvar output = document.getElementById(\"output\");\noutput.textContent = recordName; // Safe \u2014 HTML is not parsed"
      language: javascript
    bad:
    - description: Bad example code snippet.
      code: "// Using innerHTML with unsanitized data \u2014 vulnerable to XSS\nvar output = document.getElementById(\"output\");\noutput.innerHTML = \"<h1>\" + recordName + \"</h1>\";\n\n// Using eval to process data\neval(\"var data = \" + serverResponse);"
      language: javascript
  references:
  - title: Content Security Policy (CSP) - MDN Web Docs
    url: https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP
  - title: DOMPurify - GitHub
    url: https://github.com/cure53/DOMPurify
  - title: Cross-site scripting prevention - OWASP
    url: https://cheatsheetseries.owasp.org/cheatsheets/Cross-Site_Scripting_Prevention_Cheat_Sheet.html
- id: WR-004
  title: Optimize all image web resources for size and use SVG format whenever possible
  description: Optimize all image web resources for size and use SVG format whenever possible.
  guidelines:
  - Use SVG format for icons, logos, and any graphics that can be represented as vectors.
  - Compress raster images (PNG, JPG, GIF) before uploading them as web resources. Use tools such as TinyPNG, Squoosh, or ImageOptim.
  - 'Choose the appropriate raster format: PNG for images requiring transparency, JPG for photographs, and avoid BMP or TIFF entirely.'
  - "Keep image dimensions appropriate for their usage context - do not upload a 4000\xD73000 image for a 32\xD732 icon."
  - Avoid embedding large Base64-encoded images in HTML or CSS web resources.
  rationale:
  - SVG files are resolution-independent, scale perfectly on all screen sizes, and are typically much smaller than raster equivalents for icons and simple graphics.
  - Unoptimized images are the most common cause of large solution sizes and slow form load times.
  - Dataverse has a 5 MB file size limit per web resource. Optimizing images ensures you stay well within this limit.
  - Base64-encoded images bypass browser caching and inflate the size of the parent HTML or CSS file.
  examples:
    good:
    - description: A table icon uploaded as a 2 KB SVG file at contoso_/img/icons/customer.svg.
    - description: A product photograph compressed from 3.2 MB to 180 KB using TinyPNG before uploading as contoso_/img/products/widget.jpg.
    bad:
    - description: "A 1.5 MB PNG file used as a 32\xD732 table icon when a 2 KB SVG would suffice."
    - description: "An uncompressed 4000\xD73000 BMP screenshot uploaded as a dashboard background."
    - description: A 500 KB Base64-encoded logo embedded directly inside an HTML web resource.
  references:
  - title: Image web resources - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/model-driven-apps/image-web-resources
  - title: SVG on the web - MDN Web Docs
    url: https://developer.mozilla.org/en-US/docs/Web/SVG
  - title: Squoosh - Image compression tool
    url: https://squoosh.app/
- id: WR-005
  title: Prefix all CSS class and ID names with the project or publisher prefix to avoid collisi...
  description: Prefix all CSS class and ID names with the project or publisher prefix to avoid collisions with platform styles.
  guidelines:
  - 'Use a short, consistent prefix derived from your publisher or project name for all CSS selectors (e.g., .csp-header, #csp-sidebar).'
  - Do not use generic class names such as .header, .container, or .active without a prefix.
  - Keep CSS in external .css web resource files rather than inline <style> blocks in HTML web resources.
  - Avoid using !important to override platform styles - this creates fragile dependencies on the platform's internal CSS.
  rationale:
  - HTML web resources are loaded inside iframes, but in some contexts (e.g., custom pages, embedded resources) CSS can leak across boundaries. Prefixed selectors eliminate the risk of collisions.
  - Generic class names are commonly used by the platform's own stylesheets. Overriding them can cause unexpected visual side effects.
  - External CSS files can be cached by the browser separately from the HTML, improving load times on subsequent visits.
  - Using !important to fight platform styles breaks when Microsoft updates their CSS, leading to unpredictable rendering.
  examples:
    good:
    - description: Good example code snippet.
      code: ".csp-dashboard-header {\n    font-size: 18px;\n    color: #333333;\n}\n\n.csp-status-badge {\n    padding: 4px 8px;\n    border-radius: 4px;\n}"
      language: css
    bad:
    - description: Bad example code snippet.
      code: ".header {\n    font-size: 18px;\n    color: #333333;\n}\n\n.container {\n    width: 100% !important;\n}"
      language: css
  references:
  - title: CSS web resources - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/model-driven-apps/css-web-resources
- id: WR-006
  title: Keep HTML web resources lightweight, responsive, and well-structured
  description: Keep HTML web resources lightweight, responsive, and well-structured.
  guidelines:
  - Always include a proper <!DOCTYPE html> declaration, a <html lang="..."> attribute, and <meta charset="utf-8">.
  - Keep the HTML structure minimal - avoid unnecessary wrapper elements and deeply nested DOM trees.
  - Use responsive design techniques (relative units, media queries, or a lightweight CSS framework) so the resource renders correctly at different sizes.
  - Load JavaScript and CSS from separate web resource files rather than inlining them in the HTML.
  - 'Consider accessibility: use semantic HTML elements, provide alt attributes on images, and ensure sufficient color contrast.'
  rationale:
  - A proper doctype and character set declaration ensure consistent rendering across all supported browsers.
  - HTML web resources are often displayed inside iframes on forms and dashboards. Excessive DOM complexity increases rendering time within the already constrained iframe.
  - Users may resize the form pane or access it from different screen sizes. Responsive design prevents clipped or broken layouts.
  - Separating concerns (HTML, CSS, JS) improves cacheability and makes individual files easier to maintain and update independently.
  examples:
    good:
    - description: Good example code snippet.
      code: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"utf-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <meta http-equiv=\"Content-Security-Policy\"\n          content=\"default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'\">\n    <link rel=\"stylesheet\" href=\"contoso_/css/dashboard.css\">\n    <title>Customer Dashboard</title>\n</head>\n<body>\n    <main id=\"csp-dashboard\">\n        <h1>Customer Overview</h1>\n        <div id=\"csp-dashboard-content\"></div>\n    </main>\n    <script src=\"contoso_/js/dashboard/main.js\"></script>\n</body>\n</html>"
      language: html
    bad:
    - description: Bad example code snippet.
      code: "<html>\n<body>\n<script>\n    // Hundreds of lines of inline JavaScript\n</script>\n<style>\n    /* Hundreds of lines of inline CSS */\n</style>\n<div><div><div><div><div>Deeply nested content</div></div></div></div></div>\n</body>\n</html>"
      language: html
  references:
  - title: Webpage (HTML) web resources - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/model-driven-apps/webpage-html-web-resources
- id: WR-007
  title: Declare dependencies between web resources explicitly using the dependency configuratio...
  description: Declare dependencies between web resources explicitly using the dependency configuration in the solution.
  guidelines:
  - Use the web resource dependency settings in the form editor or solution explorer to declare which web resources depend on others.
  - Do not dynamically load web resources at runtime using custom script loaders unless there is no alternative.
  - When a JavaScript library depends on a shared utility library, add the utility as a dependency so the platform loads it first.
  - Before exporting a solution, use the Dependency Checker in Solution Explorer to verify that all required web resources are included.
  rationale:
  - Explicitly declared dependencies ensure the platform loads web resources in the correct order, preventing runtime errors caused by missing references.
  - Dynamic script loading hides dependencies from the solution system. When the solution is exported and imported into another environment, dynamically loaded resources may be missing, causing silent failures.
  - The Dependency Checker prevents broken solutions from being deployed to downstream environments by catching missing components before export.
  examples:
    good:
    - description: The form library list shows contoso/js/lib/utilities.js loaded before contoso/js/account/formEvents.js, because the dependency is declared in the form configuration.
    - description: The solution's Dependency Checker reports no missing components before export.
    bad:
    - description: A script dynamically loads a utility library at runtime using a custom loadScript() function. The utility library is not included in the solution, and the script fails silently in the target environment after import.
    - description: Two JavaScript libraries are added to a form without specifying their load order, causing intermittent "function is not defined" errors.
  references:
  - title: Web resource dependencies - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/model-driven-apps/web-resource-dependencies
  - title: Solution dependency management - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-platform/alm/solution-dependency-management
- id: WR-008
  title: Periodically audit and remove unused web resources from the solution
  description: Periodically audit and remove unused web resources from the solution.
  guidelines:
  - Review the solution's web resources regularly and identify any that are no longer referenced by forms, dashboards, SiteMaps, or other web resources.
  - Before deleting a web resource, verify that it is not referenced by any component using the Show Dependencies feature in Solution Explorer.
  - Remove web resources that were added for testing or prototyping and are no longer needed.
  - Document the audit in the project's change log or release notes.
  rationale:
  - Orphaned web resources increase solution size, making exports and imports slower and consuming unnecessary storage.
  - Unused resources create confusion for developers who may waste time trying to understand their purpose or inadvertently modify them.
  - Keeping the solution clean reduces the risk of accidentally deploying obsolete or conflicting code to production.
  examples:
    good:
    - description: A quarterly review identifies three JavaScript libraries that were replaced six months ago. They are verified as unused via Show Dependencies and removed from the solution.
    bad:
    - description: A solution contains 40 web resources, but only 15 are actively used. The remaining 25 are leftovers from previous development cycles that no one has reviewed or cleaned up.
    - description: A developer deletes a web resource without checking dependencies, breaking a form that still references it.
  references:
  - title: View dependencies for a component - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/maker/data-platform/view-component-dependencies
- id: WR-009
  title: Use RESX web resources for multi-language support instead of hardcoding strings in HTML...
  description: Use RESX web resources for multi-language support instead of hardcoding strings in HTML or JavaScript files.
  guidelines:
  - Create a default RESX file (e.g., contoso_/resx/Strings.resx) containing all user-facing strings.
  - Create additional RESX files for each supported language using the locale code suffix (e.g., contoso_/resx/Strings.1036.resx for French).
  - Use the Xrm.Utility.getResourceString() method to retrieve localized strings at runtime.
  - Use the user's language setting (Xrm.Utility.getGlobalContext().userSettings.languageId) to determine which RESX file to load.
  - Keep string keys consistent across all RESX files and use descriptive key names.
  rationale:
  - Hardcoded strings force a code change and redeployment every time a translation needs to be added or updated.
  - RESX files can be handed to translators without exposing application code.
  - The platform's built-in getResourceString() method handles RESX parsing and fallback automatically, reducing custom code.
  - Consistent keys across language files ensure that missing translations are immediately detectable.
  examples:
    good:
    - description: Good example code snippet.
      code: "<!-- contoso_/resx/Strings.resx (default \u2014 English) -->\n<data name=\"greeting_message\" xml:space=\"preserve\">\n    <value>Welcome to the Customer Portal</value>\n</data>\n<data name=\"save_button_label\" xml:space=\"preserve\">\n    <value>Save</value>\n</data>"
      language: xml
    - description: Good example code snippet.
      code: "<!-- contoso_/resx/Strings.1036.resx (French) -->\n<data name=\"greeting_message\" xml:space=\"preserve\">\n    <value>Bienvenue sur le portail client</value>\n</data>\n<data name=\"save_button_label\" xml:space=\"preserve\">\n    <value>Enregistrer</value>\n</data>"
      language: xml
    - description: Good example code snippet.
      code: '// Retrieving a localized string at runtime

        var greeting = Xrm.Utility.getResourceString("contoso_/resx/Strings", "greeting_message");'
      language: javascript
    bad:
    - description: Bad example code snippet.
      code: "// Hardcoded strings in JavaScript \u2014 no localization support\nvar greeting = \"Welcome to the Customer Portal\";\nvar saveLabel = \"Save\";"
      language: javascript
    - description: Bad example code snippet.
      code: "<!-- Hardcoded strings in HTML \u2014 requires code change for every language -->\n<h1>Welcome to the Customer Portal</h1>\n<button>Save</button>"
      language: html
  references:
  - title: String (RESX) web resources - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/model-driven-apps/resx-web-resources
  - title: Use RESX files to localize web resources - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/model-driven-apps/custom-html-resx-localization
