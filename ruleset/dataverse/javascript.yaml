- id: JS-015
  title: Remove all console
  description: Remove all console.log, console.debug, and debugger statements before deploying scripts to test or production environments.
  guidelines:
  - Do not leave console.log, console.warn, console.debug, or console.error calls in production code unless they are part of a deliberate logging strategy.
  - Never leave debugger statements in committed code. They pause execution in the browser when DevTools are open, causing the application to freeze for end users.
  - If runtime logging is needed in production, use a dedicated logging utility that can be enabled or disabled via a configuration flag.
  rationale:
  - console.log statements clutter the browser console, making it harder to diagnose real issues during support scenarios.
  - debugger statements cause the browser to pause execution when DevTools are open. If an end user or support engineer opens DevTools, the application freezes unexpectedly.
  - Excessive console output can impact performance in tight loops or frequently triggered events.
  - Leaving debug artifacts in production code signals a lack of code review discipline and can expose internal logic details to end users.
  examples:
    good:
    - description: Good example code snippet.
      code: "Contoso.Account.onLoad = function (executionContext) {\n    var formContext = executionContext.getFormContext();\n    var status = formContext.getAttribute(\"statuscode\").getValue();\n\n    if (status === Contoso.Account.StatusValues.ACTIVE) {\n        formContext.getControl(\"creditlimit\").setVisible(true);\n    }\n};"
      language: javascript
    bad:
    - description: Bad example code snippet.
      code: "function onLoad(executionContext) {\n    var formContext = executionContext.getFormContext();\n    var status = formContext.getAttribute(\"statuscode\").getValue();\n\n    console.log(\"Status value: \" + status); // Debug artifact left in production\n    debugger; // Freezes the browser when DevTools are open\n\n    if (status === 1) {\n        console.log(\"Setting credit limit visible\"); // Unnecessary logging\n        formContext.getControl(\"creditlimit\").setVisible(true);\n    }\n}"
      language: javascript
  references:
  - title: Best practices for client scripting - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/model-driven-apps/clientapi/client-scripting-best-practices
