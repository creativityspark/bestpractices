topic: Fetch XML
description: Good practices for Dataverse Fetch XML queries.
rules:
- id: FXL-001
  title: Always specify the columns you need explicitly using <attribute /> elements
  description: Always specify the columns you need explicitly using <attribute /> elements. Never use <all-attributes /> in production queries.
  guidelines:
  - Always specify the columns you need explicitly using <attribute /> elements. Never use <all-attributes /> in production queries.
  rationale:
  - Retrieving all columns transfers unnecessary data, increasing memory usage, network overhead, and response time.
  - Selecting only the required columns allows the platform to optimize data retrieval and reduces the load on the Dataverse SQL backend.
  - Queries with fewer columns are easier to read and maintain.
  examples:
    good:
    - description: Good example code snippet.
      code: "<fetch>\n  <entity name=\"account\">\n    <attribute name=\"name\" />\n    <attribute name=\"accountnumber\" />\n    <attribute name=\"emailaddress1\" />\n  </entity>\n</fetch>"
      language: xml
    bad:
    - description: Bad example code snippet.
      code: "<fetch>\n  <entity name=\"account\">\n    <all-attributes />\n  </entity>\n</fetch>"
      language: xml
  references:
  - title: Use FetchXML to construct a query - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/use-fetchxml-construct-query
  - title: Query data using FetchXml - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/overview
- id: FXL-002
  title: Use <filter> and <condition> elements to reduce the result set on the server
  description: Use <filter> and <condition> elements to reduce the result set on the server. Never retrieve a large data set and filter it client-side.
  guidelines:
  - Apply conditions that narrow the result set as early as possible.
  - Filter on indexed columns (primary keys, lookup columns, statecode, createdon, modifiedon) whenever possible.
  - Place filters inside <link-entity> elements to reduce the joined data before it reaches the parent entity.
  rationale:
  - Server-side filtering lets the database engine use indexes and query plans to return data efficiently.
  - Client-side filtering wastes bandwidth and memory by downloading rows that will be discarded.
  - Filtering on non-indexed columns forces full table scans, which degrade performance significantly on large tables.
  examples:
    good:
    - description: Good example code snippet.
      code: "<fetch>\n  <entity name=\"contact\">\n    <attribute name=\"firstname\" />\n    <attribute name=\"lastname\" />\n    <filter type=\"and\">\n      <condition attribute=\"statecode\" operator=\"eq\" value=\"0\" />\n      <condition attribute=\"createdon\" operator=\"last-x-days\" value=\"30\" />\n    </filter>\n  </entity>\n</fetch>"
      language: xml
    bad:
    - description: Bad example code snippet.
      code: "<fetch>\n  <entity name=\"contact\">\n    <all-attributes />\n  </entity>\n</fetch>"
      language: xml
    - description: Bad example code snippet.
      code: '// Anti-pattern: filtering thousands of records in memory

        var recentContacts = allContacts.Where(c => c.CreatedOn > DateTime.Now.AddDays(-30));'
      language: csharp
  references:
  - title: Optimize performance using FetchXml - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/optimize-performance
  - title: Filter rows using FetchXml - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/filter-rows
- id: FXL-003
  title: Use paging to retrieve large data sets in manageable chunks
  description: Use paging to retrieve large data sets in manageable chunks. Never attempt to fetch all records in a single request.
  guidelines:
  - Set the count attribute on the <fetch> element to define the page size.
  - Use the page attribute and the paging cookie returned by the platform to navigate through pages.
  - A page size between 50 and 5000 is recommended depending on the scenario. Smaller page sizes are more appropriate for interactive experiences.
  rationale:
  - Dataverse limits the number of records returned in a single request (default 5000). Queries that exceed this limit require paging to retrieve all results.
  - Fetching too many records in a single request can cause timeouts, throttling, or excessive memory usage.
  - Paging cookies improve performance on subsequent page retrievals by allowing the server to resume where it left off.
  examples:
    good:
    - description: Good example code snippet.
      code: "<fetch page=\"1\" count=\"500\">\n  <entity name=\"account\">\n    <attribute name=\"name\" />\n    <filter>\n      <condition attribute=\"statecode\" operator=\"eq\" value=\"0\" />\n    </filter>\n  </entity>\n</fetch>"
      language: xml
    - description: Good example code snippet.
      code: "<fetch page=\"2\" count=\"500\" paging-cookie=\"&lt;cookie page=&quot;1&quot;&gt;...&lt;/cookie&gt;\">\n  <entity name=\"account\">\n    <attribute name=\"name\" />\n    <filter>\n      <condition attribute=\"statecode\" operator=\"eq\" value=\"0\" />\n    </filter>\n  </entity>\n</fetch>"
      language: xml
    bad:
    - description: Bad example code snippet.
      code: "<fetch>\n  <entity name=\"account\">\n    <attribute name=\"name\" />\n  </entity>\n</fetch>"
      language: xml
  references:
  - title: Page results using FetchXml - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/page-results
- id: FXL-004
  title: Keep <link-entity> joins to a minimum
  description: Keep <link-entity> joins to a minimum. Only join tables that are necessary for the query results.
  guidelines:
  - Avoid deeply nested <link-entity> chains (more than two levels deep).
  - If you only need to filter by a related table but do not need its columns, consider using a <link-entity> with no <attribute> elements.
  - If you need data from many related tables, consider breaking the query into multiple simpler queries instead of one complex query.
  rationale:
  - Each <link-entity> adds a SQL JOIN to the generated query, increasing complexity and execution time.
  - Deeply nested joins can cause exponential growth in the intermediate result set, leading to timeouts.
  - Simpler queries are easier to debug, maintain, and optimize.
  examples:
    good:
    - description: Good example code snippet.
      code: "<fetch>\n  <entity name=\"contact\">\n    <attribute name=\"firstname\" />\n    <attribute name=\"lastname\" />\n    <link-entity name=\"account\" from=\"accountid\" to=\"parentcustomerid\" link-type=\"inner\">\n      <attribute name=\"name\" />\n      <filter>\n        <condition attribute=\"statecode\" operator=\"eq\" value=\"0\" />\n      </filter>\n    </link-entity>\n  </entity>\n</fetch>"
      language: xml
    bad:
    - description: Bad example code snippet.
      code: "<fetch>\n  <entity name=\"contact\">\n    <all-attributes />\n    <link-entity name=\"account\" from=\"accountid\" to=\"parentcustomerid\">\n      <all-attributes />\n      <link-entity name=\"opportunity\" from=\"parentaccountid\" to=\"accountid\">\n        <all-attributes />\n        <link-entity name=\"product\" from=\"productid\" to=\"productid\">\n          <all-attributes />\n          <link-entity name=\"pricelevel\" from=\"pricelevelid\" to=\"pricelevelid\">\n            <all-attributes />\n          </link-entity>\n        </link-entity>\n      </link-entity>\n    </link-entity>\n  </entity>\n</fetch>"
      language: xml
  references:
  - title: Join tables using FetchXml - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/join-tables
- id: FXL-005
  title: Choose the appropriate link-type for <link-entity> based on the data you need
  description: Choose the appropriate link-type for <link-entity> based on the data you need.
  guidelines:
  - Use inner (the default) when you only want records that have a matching related record.
  - Use outer when you need all records from the parent entity, including those without a match in the related entity.
  - When using outer joins with aggregate queries, be aware that unmatched rows produce NULL values that affect counts and other aggregations.
  rationale:
  - Using inner when outer is needed silently drops records that do not have a related record, leading to incomplete results.
  - Using outer when inner is appropriate returns unnecessary rows with null values, increasing the result set size and potentially causing confusion.
  - Mismatched join types are a common source of bugs in FetchXML queries that are difficult to diagnose.
  examples:
    good:
    - description: Good example code snippet.
      code: "<fetch>\n  <entity name=\"account\">\n    <attribute name=\"name\" />\n    <link-entity name=\"contact\" from=\"parentcustomerid\" to=\"accountid\" link-type=\"outer\" alias=\"c\">\n      <attribute name=\"fullname\" />\n    </link-entity>\n  </entity>\n</fetch>"
      language: xml
    - description: Good example code snippet.
      code: "<fetch>\n  <entity name=\"account\">\n    <attribute name=\"name\" />\n    <link-entity name=\"contact\" from=\"parentcustomerid\" to=\"accountid\" link-type=\"inner\">\n      <attribute name=\"fullname\" />\n    </link-entity>\n  </entity>\n</fetch>"
      language: xml
    bad:
    - description: Bad example code snippet.
      code: "<!-- This silently excludes accounts with no contacts -->\n<fetch>\n  <entity name=\"account\">\n    <attribute name=\"name\" />\n    <link-entity name=\"contact\" from=\"parentcustomerid\" to=\"accountid\" link-type=\"inner\">\n      <attribute name=\"fullname\" />\n    </link-entity>\n  </entity>\n</fetch>"
      language: xml
  references:
  - title: Join tables using FetchXml - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/join-tables
- id: FXL-006
  title: Use the no-lock attribute for read-only or reporting queries where real-time data accur...
  description: Use the no-lock attribute for read-only or reporting queries where real-time data accuracy is not critical.
  guidelines:
  - Add no-lock="true" to the <fetch> element for queries used in dashboards, reports, or batch reads.
  - Do not use no-lock for queries that feed into write operations or where data consistency is required.
  rationale:
  - The no-lock attribute tells Dataverse to read data without acquiring shared locks, reducing lock contention and improving query performance.
  - Without no-lock, read queries can be blocked by concurrent write operations, increasing response times.
  - The trade-off is that no-lock queries may return uncommitted data (dirty reads), which is acceptable for reporting scenarios but not for transactional logic.
  examples:
    good:
    - description: Good example code snippet.
      code: "<fetch no-lock=\"true\">\n  <entity name=\"opportunity\">\n    <attribute name=\"name\" />\n    <attribute name=\"estimatedvalue\" />\n    <filter>\n      <condition attribute=\"statecode\" operator=\"eq\" value=\"0\" />\n    </filter>\n  </entity>\n</fetch>"
      language: xml
    bad:
    - description: Bad example code snippet.
      code: "<!-- Dangerous: reading uncommitted data before updating records -->\n<fetch no-lock=\"true\">\n  <entity name=\"salesorder\">\n    <attribute name=\"totalamount\" />\n    <filter>\n      <condition attribute=\"statecode\" operator=\"eq\" value=\"0\" />\n    </filter>\n  </entity>\n</fetch>"
      language: xml
  references:
  - title: FetchXml reference - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/reference/
  - title: Optimize performance using FetchXml - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/optimize-performance
- id: FXL-007
  title: Prefer the eq and in operators over like for filter conditions
  description: Prefer the eq and in operators over like for filter conditions. Use wildcard operators only when pattern matching is genuinely required.
  guidelines:
  - Use eq for exact value matches.
  - Use in when checking against a known set of values instead of chaining multiple or conditions.
  - Reserve like with wildcards (%) for legitimate search scenarios such as user-driven search fields.
  rationale:
  - The eq and in operators allow the database to use indexes efficiently, resulting in fast lookups.
  - The like operator with leading wildcards (e.g., %value) prevents index usage and forces a full table scan.
  - Replacing multiple or conditions with a single in condition produces a cleaner query and can improve performance.
  examples:
    good:
    - description: Good example code snippet.
      code: "<filter type=\"and\">\n  <condition attribute=\"statecode\" operator=\"eq\" value=\"0\" />\n  <condition attribute=\"accountnumber\" operator=\"in\">\n    <value>ACC-001</value>\n    <value>ACC-002</value>\n    <value>ACC-003</value>\n  </condition>\n</filter>"
      language: xml
    bad:
    - description: Bad example code snippet.
      code: "<filter type=\"and\">\n  <condition attribute=\"name\" operator=\"like\" value=\"%Contoso%\" />\n</filter>"
      language: xml
    - description: Bad example code snippet.
      code: "<filter type=\"and\">\n  <condition attribute=\"name\" operator=\"begins-with\" value=\"Contoso\" />\n</filter>"
      language: xml
    - description: Bad example code snippet.
      code: "<!-- Verbose and harder to maintain -->\n<filter type=\"or\">\n  <condition attribute=\"accountnumber\" operator=\"eq\" value=\"ACC-001\" />\n  <condition attribute=\"accountnumber\" operator=\"eq\" value=\"ACC-002\" />\n  <condition attribute=\"accountnumber\" operator=\"eq\" value=\"ACC-003\" />\n</filter>"
      language: xml
  references:
  - title: Filter rows using FetchXml - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/filter-rows
- id: FXL-008
  title: Use the top attribute on the <fetch> element when you only need a limited number of rec...
  description: Use the top attribute on the <fetch> element when you only need a limited number of records.
  guidelines:
  - Set top when retrieving a fixed number of records (e.g., the most recent 10 orders).
  - Do not combine top with the page and count paging attributes - use one approach or the other.
  rationale:
  - The top attribute tells the server to stop processing as soon as the specified number of records is found, reducing execution time and resource usage.
  - Without top, the server may process the entire result set even if only a few records are needed.
  - Combining top with paging attributes leads to unpredictable behavior and is not supported.
  examples:
    good:
    - description: Good example code snippet.
      code: "<fetch top=\"10\">\n  <entity name=\"salesorder\">\n    <attribute name=\"name\" />\n    <attribute name=\"totalamount\" />\n    <order attribute=\"createdon\" descending=\"true\" />\n  </entity>\n</fetch>"
      language: xml
    bad:
    - description: Bad example code snippet.
      code: "<fetch>\n  <entity name=\"salesorder\">\n    <attribute name=\"name\" />\n    <attribute name=\"totalamount\" />\n    <order attribute=\"createdon\" descending=\"true\" />\n  </entity>\n</fetch>"
      language: xml
  references:
  - title: 'FetchXml reference: fetch element - Microsoft Learn'
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/reference/fetch
  - title: Query data using FetchXml - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/overview
- id: FXL-009
  title: Use aggregate and grouping queries carefully
  description: Use aggregate and grouping queries carefully. Avoid unnecessary aggregations and ensure grouping columns are indexed.
  guidelines:
  - Only use aggregate functions (count, sum, avg, min, max) when the business requirement calls for summarized data.
  - Include a groupby attribute on columns that define the grouping. Do not aggregate without grouping unless you need a single grand total.
  - When using distinct="true", verify the results are correct - outer joins can introduce unexpected duplicates or nulls.
  rationale:
  - Aggregate queries are more resource-intensive than standard retrieval queries because the server must scan and compute across potentially large data sets.
  - Grouping on non-indexed columns forces the database to sort and group large volumes of data in memory, which can cause timeouts.
  - Misuse of distinct with outer joins can produce misleading counts or silently exclude valid records.
  examples:
    good:
    - description: Good example code snippet.
      code: "<fetch aggregate=\"true\">\n  <entity name=\"opportunity\">\n    <attribute name=\"ownerid\" groupby=\"true\" alias=\"owner\" />\n    <attribute name=\"opportunityid\" aggregate=\"count\" alias=\"total\" />\n    <filter>\n      <condition attribute=\"statecode\" operator=\"eq\" value=\"0\" />\n    </filter>\n  </entity>\n</fetch>"
      language: xml
    bad:
    - description: Bad example code snippet.
      code: "<fetch aggregate=\"true\">\n  <entity name=\"activitypointer\">\n    <attribute name=\"activityid\" aggregate=\"count\" alias=\"total\" />\n  </entity>\n</fetch>"
      language: xml
  references:
  - title: Aggregate data using FetchXml - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/aggregate-data
- id: FXL-010
  title: Build FetchXML queries programmatically using the SDK QueryExpression-to-FetchXML conve...
  description: Build FetchXML queries programmatically using the SDK QueryExpression-to-FetchXML conversion or dedicated builder libraries. Avoid constructing FetchXML by string concatenation.
  guidelines:
  - Use the Dataverse SDK methods (e.g., QueryExpressionToFetchXmlRequest) or community FetchXML builder tools to generate queries.
  - If string construction is unavoidable, always sanitize user input to prevent FetchXML injection.
  - Store complex or reusable FetchXML queries as saved queries or user queries in Dataverse.
  rationale:
  - String concatenation is error-prone and can introduce malformed XML, missing closing tags, or incorrect attribute escaping.
  - Unsanitized user input in dynamically built FetchXML strings can lead to injection attacks, allowing users to modify the query logic.
  - Builder tools and SDK conversions produce valid, well-formed XML every time and are easier to maintain.
  examples:
    good:
    - description: Good example code snippet.
      code: 'var query = new QueryExpression("account");

        query.ColumnSet = new ColumnSet("name", "accountnumber");

        query.Criteria.AddCondition("statecode", ConditionOperator.Equal, 0);


        var request = new QueryExpressionToFetchXmlRequest { Query = query };

        var response = (QueryExpressionToFetchXmlResponse)service.Execute(request);

        string fetchXml = response.FetchXml;'
      language: csharp
    bad:
    - description: Bad example code snippet.
      code: "// Dangerous: user input is injected directly into the query\nstring fetchXml = @\"<fetch>\n  <entity name='account'>\n    <attribute name='name' />\n    <filter>\n      <condition attribute='name' operator='eq' value='\" + userInput + @\"' />\n    </filter>\n  </entity>\n</fetch>\";"
      language: csharp
  references:
  - title: Build queries with QueryExpression - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/org-service/build-queries-with-queryexpression
  - title: FetchXml reference - Microsoft Learn
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/fetchxml/reference/
